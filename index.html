<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erste Bank | Secure Asset Management</title>
    <style>
        :root { 
            --erste-blue: #00529b; --erste-orange: #fe5000; --erste-green: #28a745; 
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --bg: #f4f7f9; 
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg); margin: 0; color: #333; overflow-x: hidden; }

        /* --- AUTH SCREENS --- */
        .auth-screen { height: 100vh; width: 100%; position: fixed; top: 0; left: 0; display: flex; align-items: center; justify-content: center; z-index: 9999; background: #002d57; }
        .auth-box { background: white; padding: 40px; border-radius: 12px; width: 350px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .logo-head { color: var(--erste-blue); font-weight: 900; font-size: 28px; margin-bottom: 25px; letter-spacing: -1px; }
        .logo-head span { color: var(--erste-orange); }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-blue { width: 100%; padding: 14px; background: var(--erste-blue); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; }

        /* --- FINGERPRINT --- */
        .fp-container { margin: 30px 0; position: relative; display: flex; justify-content: center; }
        .fp-scanner { width: 85px; height: 85px; border: 2px solid #e0e0e0; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; background: #fff; }
        .scan-line { position: absolute; width: 100%; height: 3px; background: var(--erste-blue); top: 0; display: none; animation: scanMove 1.8s infinite linear; }
        @keyframes scanMove { 0% { top: 0; } 100% { top: 100%; } }

        /* --- DASHBOARD --- */
        #dashboard-ui { display: none; min-height: 100vh; }
        .navbar { background: white; border-bottom: 2px solid #eef0f2; padding: 18px 6%; display: flex; justify-content: space-between; align-items: center; }
        .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 30px; }
        .panel { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eef0f2; margin-bottom: 20px; }
        .balance { font-size: 32px; font-weight: 900; transition: 0.1s; }
        .card { height: 170px; border-radius: 20px; padding: 25px; color: white; margin-bottom: 20px; display: flex; flex-direction: column; justify-content: space-between; background: var(--gold); color: #3e2723; box-shadow: 0 12px 25px rgba(0,0,0,0.2); }

        /* --- BANK SECURITY DEVICE (ANIMATED) --- */
        #security-device {
            position: fixed; bottom: 20px; right: 20px; width: 120px; height: 160px;
            background: #222; border-radius: 10px; border: 3px solid #444; color: #0f0;
            font-family: monospace; font-size: 10px; padding: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: none; z-index: 10006;
        }
        .device-screen { height: 60px; background: #030; border: 1px solid #0f0; margin-bottom: 10px; padding: 5px; overflow: hidden; }
        .device-btn { width: 100%; height: 20px; background: #c00; border-radius: 3px; margin-bottom: 5px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }

        /* --- VIRUS OVERLAYS --- */
        .drain-alert {
            position: fixed; width: 250px; padding: 12px; background: #000; color: #ff0000;
            border: 2px solid #f00; font-family: 'Courier New', monospace; font-weight: bold;
            z-index: 10005; font-size: 10px; box-shadow: 0 0 15px red;
        }
        @keyframes panicShake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-2px, -1px); } 100% { transform: translate(1px, 2px); } }
    </style>
</head>
<body>

    <!-- LOGIN -->
    <div id="screen-login" class="auth-screen">
        <div class="auth-box">
            <div class="logo-head">ERSTE <span>BANK</span></div>
            <input type="text" placeholder="Client ID">
            <input type="password" placeholder="Password">
            <button class="btn-blue" onclick="toMFA()">SECURE LOGIN</button>
        </div>
    </div>

    <!-- MFA -->
    <div id="screen-mfa" class="auth-screen" style="display:none;">
        <div class="auth-box">
            <div class="logo-head">MFA <span>VERIFY</span></div>
            <div class="fp-container">
                <div class="fp-scanner" onclick="handleScan()">
                    <div class="scan-line" id="s-line"></div>
                    <svg width="40" height="40" viewBox="0 0 24 24"><path fill="#555" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z""")/>></svg>
                </div>
            </div>
            <p id="scan-status" style="font-size: 10px; font-weight: bold;">IDENTITY CHECK</p>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard-ui">
        <div class="navbar">
            <div class="logo-head" style="font-size: 20px; margin:0;">ERSTE <span>BANK</span></div>
            <div style="color: var(--erste-green); font-size: 10px; font-weight: bold;">✓ SECURITY SHIELD ACTIVE</div>
        </div>
        <div class="container">
            <div class="left">
                <div class="panel">
                    <h2>MFA VALIDITY TIMER</h2>
                    <div id="timer" style="font-family:monospace; font-size:24px; font-weight:900; color:#1b5e20; background:#e8f5e9; padding:10px; text-align:center;">04:14:59:00</div>
                    <button class="btn-blue" onclick="triggerVirus()">ACTIVATE ANTI-SCAM SCAN</button>
                </div>
            </div>
            <div class="right">
                <div class="panel">
                    <h2>VISA GOLD CREDIT</h2>
                    <div class="card">
                        <div class="balance" id="main-bal">€ 16,730.00</div>
                        <div style="font-family: monospace;">4627 6539 1972 9328</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SECURITY DEVICE (BANKING TOKEN) -->
    <div id="security-device">
        <div class="device-screen" id="dev-scr">SYSTEM OK</div>
        <div class="device-btn"></div>
        <div class="device-btn"></div>
        <p style="font-size:8px; text-align:center;">ERSTE SECURE TOKEN</p>
    </div>

    <script>
        function toMFA() { document.getElementById('screen-login').style.display='none'; document.getElementById('screen-mfa').style.display='flex'; }
        
        function handleScan() {
            document.getElementById('s-line').style.display='block';
            setTimeout(() => {
                document.getElementById('screen-mfa').style.display='none';
                document.getElementById('dashboard-ui').style.display='block';
                document.getElementById('security-device').style.display='block';
            }, 1500);
        }

        function triggerVirus() {
            let balance = 16730.00;
            const balDisp = document.getElementById('main-bal');
            const devScr = document.getElementById('dev-scr');
            document.body.style.animation = "panicShake 0.1s infinite";
            balDisp.style.color = "red";
            devScr.style.color = "red";
            devScr.innerHTML = "ALERT: PH_REGION ACCESS!";

            const drainer = setInterval(() => {
                if (balance > 0) {
                    let sub = Math.floor(Math.random() * 1200) + 400;
                    balance -= sub; if (balance < 0) balance = 0;
                    balDisp.innerText = "€ " + balance.toLocaleString('en-US', {minimumFractionDigits: 2});
                    devScr.innerHTML = "OUT: €" + sub;
                    
                    let alert = document.createElement('div');
                    alert.className = 'drain-alert';
                    alert.style.top = Math.random() * 80 + '%';
                    alert.style.left = Math.random() * 60 + '%';
                    alert.innerHTML = `⚠️ UNAUTHORIZED BYPASS<br>IP: 110.54.XX.XX (Manila, PH)<br>STATUS: COMPROMISED`;
                    document.body.appendChild(alert);
                } else {
                    clearInterval(drainer);
                    showDangerScreen();
                }
            }, 120);
        }

        function showDangerScreen() {
            setTimeout(() => {
                document.body.innerHTML = `
                    <div style="background:#000; color:#fff; height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:monospace; text-align:center; padding:40px; border:20px solid #900;">
                        <h1 style="color:#f00; font-size:60px; margin:0;">⚠️ DANGER</h1>
                        <h2 style="font-size:25px; letter-spacing:3px; margin:20px 0;">SYSTEM FULLY COMPROMISED</h2>
                        
                        <div style="background:#900; color:white; padding:25px; border-radius:5px; max-width:700px; box-shadow: 0 0 50px rgba(255,0,0,0.5); border: 2px solid white;">
                            <p style="font-size:20px; font-weight:bold; margin-bottom:15px;">UNAUTHORIZED ACCESS DETECTED</p>
                            <p><b>Hacker Origin:</b> PH-REGION (MANILA, PHILIPPINES)</p>
                            <p><b>Connection:</b> Proxy via Dating App Malware Link</p>
                            <p><b>Account Balance:</b> <span style="color:black; background:yellow; padding:2px 5px;">€ 0.00</span></p>
                            <hr>
                            <p style="font-size:22px; color:yellow; font-weight:900; margin-top:20px;">CONTACT THE ADMINISTRATION IMMEDIATELY</p>
                            <p style="font-size:12px;">Erste Bank Security Device ID: TOKEN_77X_PH</p>
                        </div>

                        <div style="margin-top:40px; color:#555; font-size:10px;">
                            <p>ALL TRANSACTIONS FINAL | DEVICE RECOVERY FAILED</p>
                        </div>
                    </div>
                `;
            }, 1000);
        }
    </script>
</body>
</html>
